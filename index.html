<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Movie Game</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="game-container">

    <h1>🎬 Угадай фильм</h1>

    <!-- КАДР -->
    <div class="frame-container">
      <img id="movie-frame" alt="movie frame" />
    </div>

    <!-- ВВОД -->
    <input
      id="guess-input"
      type="text"
      placeholder="Введите название фильма"
      autocomplete="off"
    />

    <button id="guess-button">Проверить</button>

    <!-- ПОДСКАЗКИ -->
    <div id="suggestions" class="suggestions"></div>

    <!-- СТАТУС -->
    <p id="message"></p>
    <p id="attempts"></p>

    <!-- ШАРИНГ -->
    <button id="share-button" style="display:none;">
      Скопировать результат
    </button>

  </div>

  <!-- MODAL -->
  <div id="win-modal" class="modal hidden">
    <div class="modal-content">

      <h2>🎉 Результат</h2>

      <p id="win-text"></p>

      <button id="copy-result">Скопировать</button>
      <button id="close-modal">Закрыть</button>

    </div>
  </div>

  <!-- SCRIPTS (ВАЖНО: порядок) -->
  <script src="movies.js"></script>
  <script src="movies-db.js"></script>
  <script src="script.js"></script>

</body>
</html>
